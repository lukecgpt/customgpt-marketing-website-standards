<style>
  .proof-bar {
    background: var(--color-bg);
    padding: 40px 0;
    border-bottom: 1px solid var(--color-border);
    overflow: hidden;
  }
  .proof-bar__label {
    text-align: center;
    font-size: var(--text-ui);
    font-weight: 600;
    color: var(--color-text-muted);
    margin-bottom: 28px;
  }
  .proof-bar__viewport {
    -webkit-mask-image: linear-gradient(
      to right,
      transparent 0px,
      #000 130px,
      #000 calc(100% - 130px),
      transparent 100%
    );
    mask-image: linear-gradient(
      to right,
      transparent 0px,
      #000 130px,
      #000 calc(100% - 130px),
      transparent 100%
    );
    overflow: hidden;
  }
  .proof-bar__track {
    display: flex;
    width: max-content;
    animation: logoScroll 48s linear infinite;
    will-change: transform;
  }
  .proof-bar__track:hover { animation-play-state: paused; }
  .proof-bar__set {
    display: flex;
    align-items: center;
    gap: 1px;
    padding: 0 1px;
    flex-shrink: 0;
  }
  .proof-bar__logo {
    display: flex;
    align-items: center;
    justify-content: center;
    height: 80px;
    flex-shrink: 0;
    filter: grayscale(1);
    opacity: 0.55;
    transition: opacity var(--transition-base), filter var(--transition-base);
  }
  .proof-bar__logo:hover { opacity: 1; filter: grayscale(0); }
  .proof-bar__logo img {
    height: 100%;
    width: auto;
    max-width: 320px;
    object-fit: contain;
    display: block;
  }
  .proof-bar__logo a { display: flex; align-items: center; justify-content: center; height: 100%; text-decoration: none; }
  @keyframes logoScroll {
    from { transform: translateX(0); }
    to   { transform: translateX(-50%); }
  }
  @media (prefers-reduced-motion: reduce) {
    .proof-bar__track { animation: none; }
  }
</style>
